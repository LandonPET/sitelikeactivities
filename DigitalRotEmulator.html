<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: 'Consolas', monospace;
        background-color: rgb(32, 0, 32);
        color: white;
        align-items: center;
        display: flex;
        justify-content: center;
        text-align: center;
        width: 100%;
  height: 100%;
  margin: auto;
  text-align: center;
      }
      .center {
        position: relative;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      #fileInput {
  text-align-last: center;
  margin: auto;
}
button {
  background-color: #000000;
  color: #ffffff;
}
      .center2 {
  margin-left: auto;
  margin-right: auto;
}
    </style>
  </head>
<body>
<label style='font-size: 36px; position: absolute; top: 0px;'>Digital Rot Emulator</label>
<input class="center2" style='position:absolute; top: 0; margin:auto; margin-top: 48px;' type='file' id='fileInput'>
<br>
<br>
<div class="center2" id='controls' style='display: none; margin-top: 77px;'>
  <div class='center2' style='background-color: #000000; width: 640px; height: 480px;' id='imagecontainer'>
    <img style='color: white' class='center2' id='ResultIMG' alt='Image has been corrupted'>
  </div>
<br>
<label>Amount of bits to flip</label>
<br>
  <input type='number' value=1 id='flipamount'>
  <br>
  <br>
<button onclick='flipbit()'>Flip random bit(s)</button>
<button onclick='downloadarray()'>Download file</button>
<br>
<br>
<label id='flippedamount'>0 bits have been flipped</label>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const ResultIMG = document.getElementById('ResultIMG');
const flipamountinput = document.getElementById('flipamount')
const flippedamount = document.getElementById('flippedamount')
const controls = document.getElementById('controls')
const imagecontainer = document.getElementById('imagecontainer')
var bitsflipped = 0
var fileformat = '.exe'
fileInput.addEventListener('change', async (event) => {
  bitsflipped = 0
	const file = event.target.files[0];
    if (!file) return;
    const buffer = await file.arrayBuffer();
    uint8Array = new Uint8Array(buffer);
    const blob = new Blob([uint8Array], { type: 'image/png' });
	const reader = new FileReader();
	reader.onload = (e) => {
	  const dataUrl = e.target.result;
 	 ResultIMG.src = dataUrl
   var img = new Image;

    img.onload = function() {
        console.log(img.width)
        imagecontainer.setAttribute('style','background-color: #000000; width:' + img.width +'px; height:' + img.height +'px');
        imagecontainer.height = img.height
    };

    img.src = dataUrl;
	};
	reader.readAsDataURL(blob);
  controls.style.display = 'block'
  fileformat = '.' + file.name.split('.').pop();
});
function flipbit() {
  bitsflipped = bitsflipped + Number(flipamountinput.value)
  flippedamount.innerText = bitsflipped + ' bits have been flipped'
  for (let i = 0; i < flipamountinput.value; i++) {
	var random = Math.floor(Math.random() * (uint8Array.length - 1))
  //console.log(uint8Array[random])
  //console.log(uint8Array)
  var random2 = Math.floor(Math.random() * 8) + 1;
  var flipper = 0
  if (random2 == 1) {
    flipper = 1;
  } else if (random2 == 2) {
    flipper = 2;
  } else if (random2 == 3) {
    flipper = 4;
  } else if (random2 == 4) {
   flipper = 8;
  } else if (random2 == 5) {
   flipper = 16;
  } else if (random2 == 6) {
   flipper = 32;
  } else if (random2 == 7) {
    flipper = 64;
  } else if (random2 == 8) {
    flipper = 128;
  }	
	  //console.log(random2)
    //console.log(uint8Array[random])
	  if ((uint8Array[random] >> (random2 - 1)) & 1 === 1) {
    	//console.log('negative')
    	uint8Array[random] = (uint8Array[random] - flipper) % 256
    } else {
    	//console.log('postive')
    	uint8Array[random] = (uint8Array[random] + flipper) % 256
    }
  }
    //console.log(uint8Array[random])
    const blob = new Blob([uint8Array], { type: 'image/png' });
	const reader = new FileReader();
	reader.onload = (e) => {
	  const dataUrl = e.target.result;
 	 ResultIMG.src = dataUrl
	};
	reader.readAsDataURL(blob);
}
function downloadarray() {
  const blob = new Blob([uint8Array], { type: 'application/octet-stream' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.style.display = 'none';
  a.href = url;
  a.download = 'BitFlipper' + fileformat;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  window.URL.revokeObjectURL(url);
}
</script>

</body>
</html>
