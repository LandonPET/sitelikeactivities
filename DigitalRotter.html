<!DOCTYPE html>
<html>
  <head>
    <style>
      .checkerboard {
            background-size: 50px 50px;
            background-image: 
        linear-gradient(45deg, #00000000 25%, transparent 25%, 
                        transparent 75%, #00000000 75%, #2e2e2e00),
        linear-gradient(45deg, #00000000 25%, transparent 25%, 
                        transparent 75%, #00000000 75%, #2d2d2d00),
        linear-gradient(45deg, #ffffff05 25%, transparent 25%, 
                        transparent 75%, #ffffff05 75%, #ffffff05),
        linear-gradient(45deg, #ffffff05 25%, transparent 25%, 
                        transparent 75%, #ffffff05 75%, #ffffff05);
            background-position: 0 0, 25px 25px, 25px 0, 0 25px;
        }
        .checkerboard2 {
            background-size: 20px 20px;
            background-image: 
        linear-gradient(45deg, #00000020 25%, transparent 25%, 
                        transparent 75%, #00000020 75%, #2e2e2e20),
        linear-gradient(45deg, #00000020 25%, transparent 25%, 
                        transparent 75%, #00000020 75%, #2d2d2d20),
        linear-gradient(45deg, #5b5b5b20 25%, transparent 25%, 
                        transparent 75%, #5b5b5b20 75%, #ffffff20),
        linear-gradient(45deg, #5b5b5b20 25%, transparent 25%, 
                        transparent 75%, #5b5b5b20 75%, #ffffff20);
            background-position: 0 0, 10px 10px, 10px 0, 0 10px;
        }
      body {
        font-family: 'Consolas', monospace;
        background-color: rgb(32, 0, 32);
        color: white;
        align-items: center;
        display: flex;
        justify-content: center;
        text-align: center;
        width: 100%;
  height: 100%;
  margin: auto;
  text-align: center;
      }
      .center {
        position: relative;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      #fileInput {
  text-align-last: center;
  margin: auto;
}
button {
  background-color: #000000;
  color: #ffffff;
}
      .center2 {
  margin-left: auto;
  margin-right: auto;
}
    </style>
  </head>
<body class='checkerboard'>
<label style='font-size: 36px; position: absolute; top: 0px;'>Digital Rot Emulator</label>
<input class="center2" style='position:absolute; top: 0; margin:auto; margin-top: 48px;' type='file' id='fileInput'>
<br>
<br>
<div class="center2" id='controls' style='display: none; margin-top: 77px;'>
  <pre id='textresult' style='background-color: black; border-radius: 1px; border-width: 1px; border-color: rgb(255, 123, 255); border-style: dashed; display: none; text-align: left;'>blehhh</pre>
  <video controls id='videocontrols' style='display: none;' src=''></video>
  <audio controls id='audiocontrols' style='display: none;' src=''></audio>
  <div class='center2 checkerboard2' style='background-color: #000000; width: 640px; height: 480px; display: none;' id='imagecontainer'>
    <img style='color: white' class='center2' id='ResultIMG' alt='Image has been corrupted'>
  </div>
<br>
<label>Amount of bits to flip</label>
<br>
  <input type='number' value=1 id='flipamount'>
  <br>
  <br>
<button onclick='flipbit()'>Flip random bit(s)</button>
<button onclick='downloadarray()'>Download file</button>
<br>
<br>
<label id='flippedamount'>0 bits have been flipped</label>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const ResultIMG = document.getElementById('ResultIMG');
const flipamountinput = document.getElementById('flipamount')
const flippedamount = document.getElementById('flippedamount')
const controls = document.getElementById('controls')
const imagecontainer = document.getElementById('imagecontainer')
const audiosource = document.getElementById('audiosource')
const audiocontrols = document.getElementById('audiocontrols')
const videocontrols = document.getElementById('videocontrols')
const textresult = document.getElementById('textresult')
var bitsflipped = 0
var fileformat = '.exe'
var filetype = 'application'
var filetype2 = 'application/x-msdownload'
const decoder = new TextDecoder('utf-8');
fileInput.addEventListener('change', async (event) => {
  bitsflipped = 0
	const file = event.target.files[0];
    if (!file) return;
    const buffer = await file.arrayBuffer();
    uint8Array = new Uint8Array(buffer);
    var blob = 0
    console.log(file.type)
    if (file && file.type.startsWith('audio/')) {
      //Audio files
      filetype = 'audio'
    } else if (file && file.type.startsWith('image/')) {
      //Image files
      filetype = 'image'
    } else if (file && file.type.startsWith('video/')) {
      //Video files
      filetype = 'video'
    } else if (file && file.type.startsWith('text/')) {
      //Text files
      filetype = 'text'
    }
    blob = new Blob([uint8Array], { type: file.type });
    filetype2 = file.type
	const reader = new FileReader();
	reader.onload = (e) => {
	  const dataUrl = e.target.result;
    if (filetype == 'image') {
    imagecontainer.style.display = ''
    videocontrols.style.display = 'none'
    audiocontrols.style.display = 'none'
    textresult.style.display = 'none'
    ResultIMG.src = dataUrl
    var img = new Image;

    img.onload = function() {
        console.log(img.width)
        imagecontainer.setAttribute('style','background-color: #000000; width:' + img.width +'px; height:' + img.height +'px');
        imagecontainer.height = img.height
    };

    img.src = dataUrl;
    }
    if (filetype == 'audio') {
      //console.log('yea')
      //console.log(audiocontrols.style.display)
      audiocontrols.style.display = ''
      videocontrols.style.display = 'none'
      imagecontainer.style.display = 'none'
      textresult.style.display = 'none'
      audiocontrols.src = dataUrl
    }
    if (filetype == 'video') {
      videocontrols.style.display = ''
      audiocontrols.style.display = 'none'
      imagecontainer.style.display = 'none'
      textresult.style.display = 'none'
      videocontrols.src = dataUrl
    }
    if (filetype == 'text') {
      textresult.style.display = ''
      audiocontrols.style.display = 'none'
      imagecontainer.style.display = 'none'
      videocontrols.style.display = 'none'
      textresult.textContent = decoder.decode(uint8Array); 
    }
     console.log(dataUrl)

	};
	reader.readAsDataURL(blob);
  controls.style.display = ''
  if (file && file.type.startsWith('audio/')) {
    //Audio files
    
  }
  fileformat = '.' + file.name.split('.').pop();
});
function flipbit() {
  bitsflipped = bitsflipped + Number(flipamountinput.value)
  flippedamount.innerText = bitsflipped + ' bits have been flipped'
  for (let i = 0; i < flipamountinput.value; i++) {
	var random = Math.floor(Math.random() * (uint8Array.length - 1))
  //console.log(uint8Array[random])
  //console.log(uint8Array)
  var random2 = Math.floor(Math.random() * 8) + 1;
  var flipper = 0
  if (random2 == 1) {
    flipper = 1;
  } else if (random2 == 2) {
    flipper = 2;
  } else if (random2 == 3) {
    flipper = 4;
  } else if (random2 == 4) {
   flipper = 8;
  } else if (random2 == 5) {
   flipper = 16;
  } else if (random2 == 6) {
   flipper = 32;
  } else if (random2 == 7) {
    flipper = 64;
  } else if (random2 == 8) {
    flipper = 128;
  }	
	  //console.log(random2)
    //console.log(uint8Array[random])
	  if ((uint8Array[random] >> (random2 - 1)) & 1 === 1) {
    	//console.log('negative')
    	uint8Array[random] = (uint8Array[random] - flipper) % 256
    } else {
    	//console.log('postive')
    	uint8Array[random] = (uint8Array[random] + flipper) % 256
    }
  }
    //console.log(uint8Array[random])
    var blob = new Blob([uint8Array], { type: filetype2 });
	const reader = new FileReader();
	reader.onload = (e) => {
	  const dataUrl = e.target.result;
 	 ResultIMG.src = dataUrl
   if (filetype == 'audio') {
      audiocontrols.src = dataUrl
    }
    if (filetype == 'video') {
      videocontrols.style.display = ''
      videocontrols.src = dataUrl
    }
    if (filetype == 'text') {
      textresult.style.display = ''
      textresult.textContent = decoder.decode(uint8Array); 
    }
	};
	reader.readAsDataURL(blob);
}
function downloadarray() {
  const blob = new Blob([uint8Array], { type: 'application/octet-stream' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.style.display = 'none';
  a.href = url;
  a.download = 'DigitalRotter' + fileformat;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  window.URL.revokeObjectURL(url);
}
</script>

</body>
</html>
